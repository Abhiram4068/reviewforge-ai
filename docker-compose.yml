version: '3.8'

services:
  # Relational Database
  db:
    image: postgres:15-alpine
    container_name: reviewforge_db
    environment:
      POSTGRES_DB: reviewforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d reviewforge"]
      interval: 5s
      timeout: 5s
      retries: 5

  # In-memory store (Celery broker / results backend)
  redis:
    image: redis:7-alpine
    container_name: reviewforge_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Vector Database (RAG backend)
  qdrant:
    image: qdrant/qdrant:latest
    container_name: reviewforge_qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # FastAPI Web API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reviewforge_backend
    volumes:
      - ./backend:/app
      - /app/venv
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/reviewforge
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      qdrant:
        condition: service_healthy

  # Celery Background Worker
  celery_worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: reviewforge_celery_worker
    command: celery -A app.tasks.celery_app.celery_app worker --loglevel=info
    volumes:
      - ./backend:/app
      - /app/venv
    environment:
      - DATABASE_URL=postgresql+psycopg2://postgres:postgres@db:5432/reviewforge
      - REDIS_URL=redis://redis:6379/0
      - QDRANT_URL=http://qdrant:6333
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: reviewforge_frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000/api/v1
    depends_on:
      - backend

volumes:
  pgdata:
  redisdata:
  qdrantdata:
